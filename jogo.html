<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Caça-Palavras</title>
  <style>
    :root { --baseW: 1155px; --baseH: 650px; }

    html, body {
      height: 100%;
      margin: 0;
      background: url("img/bg.png") no-repeat center center fixed;
      background-size: cover;
      font-family: "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }

    #stage {
      position: absolute;
      width: var(--baseW);
      height: var(--baseH);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center center;
      will-change: transform;
    }

    .glass, .glass-strong {
      background: rgba(255,255,255,0.55);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      border-radius: 12px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.18);
      border: 1px solid rgba(0,0,0,0.08);
    }

    #container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 10px;
      box-sizing: border-box;
    }

    header {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 10px;
    }

    #topbar {
      display: inline-flex;
      align-items: center;
      gap: 15px;
      padding: 8px 12px;
      margin: 0 0 0 100px;
    }

    #cronometro {
      font-size: 21px;
      font-weight: bold;
      color: #333;
    }

    #novoJogo, #btnReiniciar {
      padding: 6px 14px;
      font-size: 19px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s, transform 0.05s;
    }

    #novoJogo { background: #2196f3; }
    #novoJogo:hover { background: #1976d2; }

    #btnReiniciar {
      background: #008542;
      margin-left: 10px;
    }
    #btnReiniciar:hover { background: #006b34; }

    #novoJogo:active, #btnReiniciar:active {
      transform: translateY(1px);
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }

    #sidebar {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-right: 8px;
      padding: 10px 14px;
    }

    #palavras {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    #palavras li {
      margin: 2px 0;
      font-weight: bold;
      color: #333;
      font-size: 22px;
    }

    #palavras li.found {
      text-decoration: line-through;
      color: #008542;
    }

    #progresso {
      margin-top: 8px;
      font-size: 19px;
      font-weight: bold;
      color: #333;
    }

    #progressBar {
      width: 100%;
      height: 12px;
      background: #000;
      border-radius: 6px;
      margin-top: 3px;
      overflow: hidden;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: #008542;
      transition: width 0.3s;
    }

    #board {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }

    table {
      border-collapse: collapse;
      user-select: none;
    }

    td {
      width: 32px;
      height: 32px;
      text-align: center;
      vertical-align: middle;
      border: 1px solid #ccc;
      font-weight: bold;
      font-size: 23px;
      cursor: pointer;
      transition: background 0.2s;
    }

    td.selected { background: #fdc82f; }
    td.found {
      background: #00b2a9;
      color: #fff;
    }

    #vitoria {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      display: none;
      max-width: min(480px, 90%);
      text-align: center;
      padding: 12px 18px;
      font-size: 19px;
      font-weight: bold;
      color: #008542;
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="container">
      <header>
        <div id="topbar" class="glass">
          <div id="cronometro">⏱ Tempo: 0m 0s</div>
          <button id="novoJogo">🔄 Novo Jogo</button>
        </div>
      </header>
      <main>
        <div id="sidebar" class="glass">
          <ul id="palavras"></ul>
          <div id="progresso"></div>
          <div id="progressBar">
            <div id="progressFill"></div>
          </div>
        </div>
        <div id="board" class="glass-strong">
          <table id="grid"></table>
          <div id="vitoria" class="glass" role="dialog" aria-live="polite">
            Parabéns! <br>Você encontrou todas as palavras!<br><br>
            <button id="btnReiniciar" aria-label="Jogar novamente">Jogar Novamente</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const palavras = [
      "TONINHA","INSUMOS","RECICLAGEM","IMPACTO",
      "MITIGAR","MONITORAR","REABILITAR","ACIONAMENTO",
      "COMUNICACAO","RESIDUO","LICENCA","LINHAVERDE"
    ];
    const tamanho = 15;
    const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const direcoesSelecao = [[0,1],[1,0],[1,1]];
    const direcoesHV = [[0,1],[1,0]];

    let grid, tabela, lista, progresso, vitoria, cronometroEl, progressFill;
    let selecionando = false, inicio = null, fim = null, linhaAtual = [];
    let encontrados = 0, tempo = 0, intervalo = null;

    function letraRandom() {
      return letras[Math.floor(Math.random() * letras.length)];
    }

    function preencherVazios() {
      for (let i = 0; i < tamanho; i++) {
        for (let j = 0; j < tamanho; j++) {
          if (grid[i][j] === "") grid[i][j] = letraRandom();
        }
      }
    }

    function colocaPalavraComDirecao(palavra, dir) {
      let tentativas = 0;
      while (tentativas < 300) {
        const linha = Math.floor(Math.random() * tamanho);
        const col = Math.floor(Math.random() * tamanho);
        let r = linha, c = col, pode = true;
        for (let i = 0; i < palavra.length; i++) {
          if (r < 0 || r >= tamanho || c < 0 || c >= tamanho || (grid[r][c] !== "" && grid[r][c] !== palavra[i])) {
            pode = false;
            break;
          }
          r += dir[0];
          c += dir[1];
        }
        if (pode) {
          r = linha;
          c = col;
          for (let i = 0; i < palavra.length; i++) {
            grid[r][c] = palavra[i];
            r += dir[0];
            c += dir[1];
          }
          return true;
        }
        tentativas++;
      }
      return false;
    }

    function colocaPalavraHV(palavra) {
      let colocado = false;
      while (!colocado) {
        const dir = direcoesHV[Math.floor(Math.random() * direcoesHV.length)];
        const linha = Math.floor(Math.random() * tamanho);
        const col = Math.floor(Math.random() * tamanho);
        let r = linha, c = col, pode = true;
        for (let i = 0; i < palavra.length; i++) {
          if (r < 0 || r >= tamanho || c < 0 || c >= tamanho || (grid[r][c] !== "" && grid[r][c] !== palavra[i])) {
            pode = false;
            break;
          }
          r += dir[0];
          c += dir[1];
        }
        if (pode) {
          r = linha;
          c = col;
          for (let i = 0; i < palavra.length; i++) {
            grid[r][c] = palavra[i];
            r += dir[0];
            c += dir[1];
          }
          colocado = true;
        }
      }
    }

    function doisIndicesDistintos(n) {
      const a = Math.floor(Math.random() * n);
      let b = Math.floor(Math.random() * n);
      while (b === a) b = Math.floor(Math.random() * n);
      return [a, b];
    }

    function prepararGradeComDuasDiagonais() {
      for (let reset = 0; reset < 80; reset++) {
        grid = Array.from({ length: tamanho }, () => Array(tamanho).fill(""));
        const [i1, i2] = doisIndicesDistintos(palavras.length);
        const ok1 = colocaPalavraComDirecao(palavras[i1], [1,1]);
        const ok2 = colocaPalavraComDirecao(palavras[i2], [1,1]);
        if (ok1 && ok2) {
          for (let i = 0; i < palavras.length; i++) {
            if (i === i1 || i === i2) continue;
            colocaPalavraHV(palavras[i]);
          }
          return true;
        }
      }
      grid = Array.from({ length: tamanho }, () => Array(tamanho).fill(""));
      const [i1, i2] = doisIndicesDistintos(palavras.length);
      colocaPalavraComDirecao(palavras[i1], [1,1]);
      colocaPalavraHV(palavras[i2]);
      for (let i = 0; i < palavras.length; i++) {
        if (i === i1 || i === i2) continue;
        colocaPalavraHV(palavras[i]);
      }
      return false;
    }

    function inicializarJogo() {
      prepararGradeComDuasDiagonais();
      preencherVazios();

      tabela.innerHTML = "";
      grid.forEach((linha, i) => {
        const tr = document.createElement("tr");
        linha.forEach((letra, j) => {
          const td = document.createElement("td");
          td.textContent = letra;
          td.dataset.row = i;
          td.dataset.col = j;
          tr.appendChild(td);
        });
        tabela.appendChild(tr);
      });

      lista.innerHTML = "";
      palavras.forEach(p => {
        const li = document.createElement("li");
        li.textContent = p;
        lista.appendChild(li);
      });

      encontrados = 0;
      progresso.textContent = `0 / ${palavras.length} palavras encontradas`;
      progressFill.style.width = "0%";
      vitoria.style.display = "none";
      tempo = 0;
      cronometroEl.textContent = "⏱ Tempo: 0m 0s";

      if (intervalo) clearInterval(intervalo);
      intervalo = setInterval(() => {
        tempo++;
        const min = Math.floor(tempo / 60);
        const seg = tempo % 60;
        cronometroEl.textContent = `⏱ Tempo: ${min}m ${seg}s`;
      }, 1000);
    }

    function destacarLinha(inicio, fim) {
      linhaAtual.forEach(td => td.classList.remove("selected"));
      linhaAtual = [];
      if (!inicio || !fim) return;

      const r1 = +inicio.dataset.row, c1 = +inicio.dataset.col;
      const r2 = +fim.dataset.row, c2 = +fim.dataset.col;
      let dr = r2 - r1, dc = c2 - c1;
      let steps = Math.max(Math.abs(dr), Math.abs(dc));
      let stepR = dr === 0 ? 0 : dr / Math.abs(dr);
      let stepC = dc === 0 ? 0 : dc / Math.abs(dc);
      if (!((stepR === 0 && stepC === 1) || (stepR === 1 && stepC === 0) || (stepR === 1 && stepC === 1))) return;

      let r = r1, c = c1;
      for (let i = 0; i <= steps; i++) {
        const td = document.querySelector(`td[data-row='${r}'][data-col='${c}']`);
        if (td) linhaAtual.push(td);
        r += stepR;
        c += stepC;
      }
      linhaAtual.forEach(td => td.classList.add("selected"));
    }

    function validarSelecao() {
      if (linhaAtual.length < 2) return;

      const palavraSel = linhaAtual.map(td => td.textContent).join("");
      const palavraSelInvertida = linhaAtual.map(td => td.textContent).reverse().join("");
      let alvo = null;
      palavras.forEach(p => { if (p === palavraSel || p === palavraSelInvertida) alvo = p; });

      if (alvo && linhaAtual.length === alvo.length) {
        linhaAtual.forEach(td => { td.classList.remove("selected"); td.classList.add("found"); });
        Array.from(lista.children).forEach(li => {
          if (li.textContent === alvo && !li.classList.contains("found")) {
            li.classList.add("found");
            encontrados++;
            progresso.textContent = `${encontrados} / ${palavras.length} palavras encontradas`;
            progressFill.style.width = `${(encontrados / palavras.length) * 100}%`;
            if (encontrados === palavras.length) {
              vitoria.style.display = "block";
              const btn = document.getElementById("btnReiniciar");
              if (btn) btn.focus();
              clearInterval(intervalo);
            }
          }
        });
      } else {
        linhaAtual.forEach(td => td.classList.remove("selected"));
      }
      linhaAtual = [];
    }

    function ativarEventos() {
      tabela.addEventListener("mousedown", e => {
        if (e.target.tagName === "TD") {
          selecionando = true;
          inicio = e.target;
          fim = null;
        }
      });
      tabela.addEventListener("mouseover", e => {
        if (selecionando && e.target.tagName === "TD") {
          fim = e.target;
          destacarLinha(inicio, fim);
        }
      });
      window.addEventListener("mouseup", () => {
        if (selecionando) {
          validarSelecao();
          selecionando = false;
          inicio = null;
          fim = null;
        }
      });
      tabela.addEventListener("touchstart", e => {
        const td = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
        if (td && td.tagName === "TD") {
          selecionando = true;
          inicio = td;
          fim = null;
        }
      });
      tabela.addEventListener("touchmove", e => {
        const td = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
        if (selecionando && td && td.tagName === "TD") {
          fim = td;
          destacarLinha(inicio, fim);
        }
      });
      tabela.addEventListener("touchend", () => {
        if (selecionando) {
          validarSelecao();
          selecionando = false;
          inicio = null;
          fim = null;
        }
      });
    }

    function applyScale() {
      const baseW = 1155, baseH = 650;
      const vw = window.innerWidth, vh = window.innerHeight;
      const scale = Math.min(vw / baseW, vh / baseH, 1);
      document.getElementById('stage').style.transform = `translate(-50%, -50%) scale(${scale})`;
    }

    tabela = document.getElementById("grid");
    lista = document.getElementById("palavras");
    progresso = document.getElementById("progresso");
    vitoria = document.getElementById("vitoria");
    cronometroEl = document.getElementById("cronometro");
    progressFill = document.getElementById("progressFill");

    inicializarJogo();
    ativarEventos();

    document.getElementById("novoJogo").addEventListener("click", () => {
      inicializarJogo();
      applyScale();
    });

    document.getElementById("btnReiniciar").addEventListener("click", () => {
      inicializarJogo();
      applyScale();
    });

    window.addEventListener('load', applyScale);
    window.addEventListener('resize', applyScale);
    window.addEventListener('orientationchange', applyScale);
  </script>
</body>
</html>
