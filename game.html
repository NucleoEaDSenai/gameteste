<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Caça-Palavras</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f6fb;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    #container {
      max-width: 1155px;
      max-height: 650px;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 10px;
      box-sizing: border-box;
    }
    /* topo central */
    header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }
    #cronometro {
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }
    #novoJogo {
      padding: 6px 14px;
      font-size: 14px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      background: #2196f3;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }
    #novoJogo:hover { background: #1976d2; }

    /* meio: 2 colunas */
    main {
      flex: 1;
      display: flex;
      gap: 15px; /* aproxima mais colunas */
      overflow: hidden;
    }
    /* coluna esquerda */
    #sidebar {
      flex: 0 0 200px; /* mais estreito */
      display: flex;
      flex-direction: column;
      align-items: flex-start; /* alinhado à esquerda */
    }
    #palavras {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start; /* palavras ficam alinhadas à esquerda */
    }
    #palavras li {
      margin: 2px 0;
      font-weight: bold;
      color: #333;
      font-size: 14px;
    }
    #palavras li.found { text-decoration: line-through; color: #4caf50; }

    /* barra de progresso colada na lista */
    #progresso {
      margin-top: 6px;
      font-size: 14px;
      font-weight: bold;
      color: #333;
      text-align: left;
      width: 100%;
    }
    #progressBar {
      width: 100%;
      height: 12px;
      background: #ddd;
      border-radius: 6px;
      margin-top: 3px;
      overflow: hidden;
    }
    #progressFill {
      height: 100%;
      width: 0%;
      background: #4caf50;
      transition: width 0.3s;
    }

    /* coluna direita */
    #board {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    table {
      border-collapse: collapse;
      user-select: none;
    }
    td {
      width: 32px;
      height: 32px;
      text-align: center;
      vertical-align: middle;
      border: 1px solid #ccc;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    td.selected { background: #87ceeb; }
    td.found { background: #4caf50; color: #fff; }

    /* rodapé */
    #vitoria {
      margin-top: 6px;
      font-size: 18px;
      font-weight: bold;
      color: #4caf50;
      display: none;
      text-align: center;
    }

    /* responsivo */
    @media (max-width: 800px) {
      main { flex-direction: column; align-items: center; }
      #sidebar { flex: none; width: 100%; align-items: center; }
      #palavras { flex-direction: row; flex-wrap: wrap; justify-content: center; align-items: center; }
      td { width: 24px; height: 24px; font-size: 13px; }
      #progresso { text-align: center; }
    }
    @media (max-width: 500px) {
      td { width: 20px; height: 20px; font-size: 11px; }
    }
  </style>
</head>
<body>
  <div id="container">
    <header>
      <div id="cronometro">⏱ Tempo: 0m 0s</div>
      <button id="novoJogo">🔄 Novo Jogo</button>
    </header>
    <main>
      <div id="sidebar">
        <ul id="palavras"></ul>
        <div id="progresso"></div>
        <div id="progressBar"><div id="progressFill"></div></div>
      </div>
      <div id="board">
        <table id="grid"></table>
      </div>
    </main>
    <div id="vitoria">🎉 Parabéns! Você encontrou todas as palavras! 🎉</div>
  </div>

  <script>
    const palavras = [
      "TONINHA", "INSUMOS", "RECICLAGEM", "IMPACTO",
      "MITIGAR", "MONITORAR", "REABILITAR", "ACIONAMENTO",
      "COMUNICACAO", "RESIDUO", "LICENCA", "LINHAVERDE"
    ];
    const tamanho = 15;
    const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const direcoes = [[0, 1], [1, 0], [1, 1]]; // → ↓ ↘

    let grid, tabela, lista, progresso, vitoria, cronometroEl, progressFill;
    let selecionando = false, inicio = null, fim = null, linhaAtual = [];
    let encontrados = 0, tempo = 0, intervalo = null;

    function inicializarJogo() {
      grid = Array.from({ length: tamanho }, () => Array(tamanho).fill(""));
      palavras.forEach(p => colocaPalavra(p));
      for (let i = 0; i < tamanho; i++) {
        for (let j = 0; j < tamanho; j++) {
          if (grid[i][j] === "") {
            grid[i][j] = letras[Math.floor(Math.random() * letras.length)];
          }
        }
      }
      tabela.innerHTML = "";
      grid.forEach((linha, i) => {
        const tr = document.createElement("tr");
        linha.forEach((letra, j) => {
          const td = document.createElement("td");
          td.textContent = letra;
          td.dataset.row = i;
          td.dataset.col = j;
          tr.appendChild(td);
        });
        tabela.appendChild(tr);
      });
      lista.innerHTML = "";
      palavras.forEach(p => {
        const li = document.createElement("li");
        li.textContent = p;
        lista.appendChild(li);
      });
      encontrados = 0;
      progresso.textContent = `0 / ${palavras.length} palavras encontradas`;
      progressFill.style.width = "0%";
      vitoria.style.display = "none";
      tempo = 0;
      cronometroEl.textContent = "⏱ Tempo: 0m 0s";
      if (intervalo) clearInterval(intervalo);
      intervalo = setInterval(() => {
        tempo++;
        const min = Math.floor(tempo / 60);
        const seg = tempo % 60;
        cronometroEl.textContent = `⏱ Tempo: ${min}m ${seg}s`;
      }, 1000);
    }

    function colocaPalavra(palavra) {
      let colocado = false;
      while (!colocado) {
        const dir = direcoes[Math.floor(Math.random() * direcoes.length)];
        const linha = Math.floor(Math.random() * tamanho);
        const col = Math.floor(Math.random() * tamanho);
        let r = linha, c = col, pode = true;
        for (let i = 0; i < palavra.length; i++) {
          if (r < 0 || r >= tamanho || c < 0 || c >= tamanho ||
              (grid[r][c] !== "" && grid[r][c] !== palavra[i])) {
            pode = false;
            break;
          }
          r += dir[0]; c += dir[1];
        }
        if (pode) {
          r = linha; c = col;
          for (let i = 0; i < palavra.length; i++) {
            grid[r][c] = palavra[i];
            r += dir[0]; c += dir[1];
          }
          colocado = true;
        }
      }
    }

    function destacarLinha(inicio, fim) {
      linhaAtual.forEach(td => td.classList.remove("selected"));
      linhaAtual = [];
      if (!inicio || !fim) return;
      const r1 = parseInt(inicio.dataset.row), c1 = parseInt(inicio.dataset.col);
      const r2 = parseInt(fim.dataset.row), c2 = parseInt(fim.dataset.col);
      let dr = r2 - r1, dc = c2 - c1;
      let steps = Math.max(Math.abs(dr), Math.abs(dc));
      let stepR = dr === 0 ? 0 : dr / Math.abs(dr);
      let stepC = dc === 0 ? 0 : dc / Math.abs(dc);
      if (!((stepR === 0 && stepC === 1) || (stepR === 1 && stepC === 0) || (stepR === 1 && stepC === 1))) return;
      let r = r1, c = c1;
      for (let i = 0; i <= steps; i++) {
        const td = document.querySelector(`td[data-row='${r}'][data-col='${c}']`);
        if (td) linhaAtual.push(td);
        r += stepR; c += stepC;
      }
      linhaAtual.forEach(td => td.classList.add("selected"));
    }

    function validarSelecao() {
      if (linhaAtual.length < 2) return;
      const palavraSel = linhaAtual.map(td => td.textContent).join("");
      const palavraSelInvertida = linhaAtual.map(td => td.textContent).reverse().join("");
      let achou = null;
      palavras.forEach(p => {
        if (p === palavraSel || p === palavraSelInvertida) achou = p;
      });
      if (achou) {
        linhaAtual.forEach(td => {
          td.classList.remove("selected");
          td.classList.add("found");
        });
        Array.from(lista.children).forEach(li => {
          if (li.textContent === achou && !li.classList.contains("found")) {
            li.classList.add("found");
            encontrados++;
            progresso.textContent = `${encontrados} / ${palavras.length} palavras encontradas`;
            progressFill.style.width = `${(encontrados / palavras.length) * 100}%`;
            if (encontrados === palavras.length) {
              vitoria.style.display = "block";
              clearInterval(intervalo);
            }
          }
        });
      } else {
        linhaAtual.forEach(td => td.classList.remove("selected"));
      }
      linhaAtual = [];
    }

    function ativarEventos() {
      tabela.addEventListener("mousedown", e => {
        if (e.target.tagName === "TD") {
          selecionando = true;
          inicio = e.target;
          fim = null;
        }
      });
      tabela.addEventListener("mouseover", e => {
        if (selecionando && e.target.tagName === "TD") {
          fim = e.target;
          destacarLinha(inicio, fim);
        }
      });
      window.addEventListener("mouseup", () => {
        if (selecionando) {
          validarSelecao();
          selecionando = false;
          inicio = null;
          fim = null;
        }
      });
      tabela.addEventListener("touchstart", e => {
        const td = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
        if (td && td.tagName === "TD") {
          selecionando = true;
          inicio = td;
          fim = null;
        }
      });
      tabela.addEventListener("touchmove", e => {
        const td = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
        if (selecionando && td && td.tagName === "TD") {
          fim = td;
          destacarLinha(inicio, fim);
        }
      });
      tabela.addEventListener("touchend", () => {
        if (selecionando) {
          validarSelecao();
          selecionando = false;
          inicio = null;
          fim = null;
        }
      });
    }

    tabela = document.getElementById("grid");
    lista = document.getElementById("palavras");
    progresso = document.getElementById("progresso");
    vitoria = document.getElementById("vitoria");
    cronometroEl = document.getElementById("cronometro");
    progressFill = document.getElementById("progressFill");

    inicializarJogo();
    ativarEventos();

    document.getElementById("novoJogo").addEventListener("click", inicializarJogo);
  </script>
</body>
</html>
